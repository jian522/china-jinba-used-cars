<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#081a2b">
  <title>车辆管理后台 | Jinba Auto</title>
  <link rel="stylesheet" href="/admin/admin.css?v=1">
</head>
<body>
  <header class="bar"><a class="brand" href="/admin/"><span>J</span><b>JINBA AUTO</b><small>车辆管理后台</small></a><nav><a href="/zh/">查看网站</a><a href="https://github.com/jian522/china-jinba-used-cars/actions/workflows/vehicle-admin.yml">发布记录</a></nav></header>
  <main>
    <section class="hero"><div><p class="eyebrow">OWNER CONSOLE</p><h1>车辆库存管理</h1><p>搜索车辆、检查照片、更新资料并自动发布四种语言页面。</p></div><a class="button primary" href="https://github.com/jian522/china-jinba-used-cars/issues/new?template=add-vehicle.yml">＋ 新增车辆</a></section>
    <section class="stats" aria-label="库存统计"><article><span id="total">—</span><small>车辆总数</small></article><article><span id="published">—</span><small>已发布</small></article><article><span id="limited">—</span><small>照片待补</small></article><article><span id="complete">—</span><small>图集完整</small></article></section>
    <section class="tools"><label><span class="sr-only">搜索车辆</span><input id="search" type="search" placeholder="搜索库存编号、品牌或车型…" autocomplete="off"></label><select id="status" aria-label="状态筛选"><option value="all">全部状态</option><option value="published">已发布</option><option value="unpublished">未发布</option><option value="limited">照片待补</option><option value="complete">图集完整</option></select><a class="button" href="https://github.com/jian522/china-jinba-used-cars/issues/new?template=bulk-photo-import.yml">批量补图</a></section>
    <div id="notice" class="notice">正在读取车辆数据…</div>
    <section id="cars" class="cars" aria-live="polite"></section>
  </main>
  <footer>只有 GitHub 仓库所有者 jian522 提交的操作会执行。后台不保存密码或访问令牌。</footer>
  <script src="/admin/app.js?v=1" defer></script>
</body>
</html>
