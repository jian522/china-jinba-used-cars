name: 下架车辆
description: 将已售或不可用车辆从公开库存下架，数据仍保留
title: "[下架车辆] "
labels: ["vehicle-admin", "vehicle-unpublish"]
body:
  - type: input
    id: id
    attributes: {label: Vehicle ID, placeholder: "17"}
    validations: {required: true}
  - type: dropdown
    id: reason
    attributes: {label: Reason, options: [Sold, Reserved, Unavailable, Data correction]}
    validations: {required: true}
  - type: checkboxes
    id: confirm
    attributes:
      label: 确认
      options:
        - label: 我确认需要把这台车辆从公开库存下架。
          required: true
