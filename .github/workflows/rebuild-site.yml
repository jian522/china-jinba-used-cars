name: Rebuild multilingual site

on:
  push:
    branches: [main]
    paths:
      - scripts/rebuild_site.py
      - assets/jinba-global.css
      - assets/jinba-global.js
      - assets/v3.css
      - assets/v3.js
      - scripts/build_v2.py
      - scripts/enrich_inventory.py
      - scripts/seo_content.py
      - scripts/photo_audit.py
      - scripts/batch_photo_import.py
      - scripts/submit_indexnow.py
      - data/vehicles.json
      - robots.txt
      - .github/workflows/rebuild-site.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repair images and inject multilingual controls
        run: |
          python3 scripts/build_v2.py
      - name: Validate generated site
        run: |
          test "$(grep -Rho 'autoimg.cn' --include='*.html' . | wc -l)" -eq 0
          expected="$(python3 -c "import json; print(sum(v.get('status') == 'published' for v in json.load(open('data/vehicles.json'))) * 4)")"
          test "$(find en zh ru ar -path '*/cars/*/index.html' | wc -l)" -eq "$expected"
          test "$(grep -Rho 'hreflang=' en zh ru ar --include='*.html' | wc -l)" -gt 2500
          test "$(grep -Rho 'href="/admin/"' en zh ru ar --include='*.html' | wc -l)" -eq 0
          test -f admin/index.html
          test -f admin/login/index.html
          test -f admin/photo-coverage/index.html
          grep -q 'noindex,nofollow,noarchive' admin/index.html
          grep -q 'noindex,nofollow,noarchive' admin/login/index.html
          grep -q "github.actor == 'jian522'" .github/workflows/vehicle-admin.yml
          python3 -c "import json; a=json.load(open('data/photo-audit.json')); v=[x for x in json.load(open('data/vehicles.json')) if x.get('status') == 'published']; assert a['summary']['published_vehicles'] == len(v); assert a['summary']['incomplete_vehicles'] == sum(len(x.get('photos', [])) < 6 for x in v)"
          python3 -m py_compile scripts/build_v2.py scripts/enrich_inventory.py scripts/photo_audit.py scripts/admin_vehicle.py scripts/batch_photo_import.py
      - name: Publish generated pages
        run: |
          git config user.name "Jinba Site Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Rebuild multilingual vehicle inventory [skip ci]"
            git push
          fi
